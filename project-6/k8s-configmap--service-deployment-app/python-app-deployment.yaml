apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-app-deployment
  namespace: devops-cluster

spec:
  replicas: 3
  selector:
    matchLabels:
      app: python-app
  template:
    metadata:
      labels:
        app: python-app
    spec:
      containers:
        - name: python-app
          image: python-app:latest
          imagePullPolicy: Never
          ports:
           - containerPort: 5000
          env:
           - name: APP_COLOR
             valueFrom:
               configMapKeyRef:
                 name: python-app-config
                 key: APP_COLOR

