version: "3.9"

services:
  app1:
    build: ./app
    container_name: app1
    environment:
      - SERVICE_NAME=app1

  app2:
    build: ./app
    container_name: app2
    environment:
      - SERVICE_NAME=app2

  app3:
    build: ./app
    container_name: app3
    environment:
      - SERVICE_NAME=app3

  nginx:
    build: ./nginx
    container_name: nginx
    ports:
      - "8001:80"
    depends_on:
      - app1
      - app2
      - app3
